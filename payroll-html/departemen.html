<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Departemen - Sistem Payroll</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=figtree:400,500,600,700&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body {
            background-color: #f3f4f6;
            color: #1f2937;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="font-sans antialiased bg-gray-100 text-gray-800 flex h-screen overflow-hidden" x-data="{ sidebarOpen: false, isOpen: false }">

    <aside class="flex-shrink-0 w-64 bg-gray-900 text-white flex flex-col transition-all duration-300 z-20"
           :class="{'fixed inset-y-0 left-0 transform translate-x-0': sidebarOpen, '-translate-x-full absolute': !sidebarOpen, 'md:relative md:translate-x-0': true}">
        
        <div class="h-16 flex items-center justify-center bg-gray-950 px-4 border-b border-gray-800">
            <span class="text-xl font-bold tracking-wider text-blue-400">PAYROLL<span class="text-white">PRO</span></span>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Menu Utama</p>
            <a href="index.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-300 hover:bg-gray-800 hover:text-white">
                Dashboard
            </a>

            <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-6">Master Data</p>
            <a href="departemen.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md bg-gray-800 text-white">
            Departemen
            </a>

            <a href="jabatan.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-300 hover:bg-gray-800 hover:text-white">
            Jabatan
            </a>

            <a href="karyawan.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-300 hover:bg-gray-800 hover:text-white">
            Karyawan
            </a>

            <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-6">Transaksi</p>
            <a href="penggajian.html" class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-300 hover:bg-gray-800 hover:text-white">
            Proses Penggajian
            </a>
        </nav>
    </aside>

    <div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 bg-black opacity-50 z-10 md:hidden" style="display: none;"></div>

    <div class="flex-1 flex flex-col w-full min-w-0">
        
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-4 sm:px-6 z-10">
            <button @click="sidebarOpen = true" class="md:hidden text-gray-500 hover:text-gray-700 focus:outline-none">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div class="hidden md:block"></div>

            <div class="flex items-center space-x-4">
                <span class="text-sm font-medium text-gray-700 hidden sm:block">Halo, Administrator</span>
                
                <a href="login.html" class="text-sm text-red-600 hover:text-red-800 font-medium px-3 py-2 rounded-md hover:bg-red-50 transition">
                    Logout
                </a>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 bg-gray-50">
            <div>
                <div class="mb-6 flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800">Manajemen Departemen</h2>
                        <p class="text-sm text-gray-600">Kelola master data departemen perusahaan.</p>
                    </div>
                    <button @click="isOpen = true" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md shadow-sm transition">
                        + Tambah Departemen
                    </button>
                </div>

                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                        <div class="w-full max-w-sm relative">
                            <input type="text" placeholder="Cari kode atau nama departemen..." class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                            <span class="absolute right-3 top-2 text-gray-400">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                            </span>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-100 text-gray-700 uppercase text-xs font-semibold">
                                    <th class="px-6 py-3 border-b border-gray-200">No</th>
                                    <th class="px-6 py-3 border-b border-gray-200">Kode</th>
                                    <th class="px-6 py-3 border-b border-gray-200">Nama Departemen</th>
                                    <th class="px-6 py-3 border-b border-gray-200 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                <tr class="hover:bg-gray-50">
                                    <td class="px-6 py-4 text-sm text-gray-500">1</td>
                                    <td class="px-6 py-4 text-sm font-medium text-gray-800">IT</td>
                                    <td class="px-6 py-4 text-sm text-gray-600">Teknologi Informasi</td>
                                    <td class="px-6 py-4 text-sm text-center font-medium">
                                        <button @click="isOpen = true" class="text-blue-600 hover:text-blue-900 mr-3">Edit</button>
                                        <button class="text-red-600 hover:text-red-900">Hapus</button>
                                    </td>
                                </tr>
                                <tr class="hover:bg-gray-50">
                                    <td class="px-6 py-4 text-sm text-gray-500">2</td>
                                    <td class="px-6 py-4 text-sm font-medium text-gray-800">HRD</td>
                                    <td class="px-6 py-4 text-sm text-gray-600">Human Resources</td>
                                    <td class="px-6 py-4 text-sm text-center font-medium">
                                        <button @click="isOpen = true" class="text-blue-600 hover:text-blue-900 mr-3">Edit</button>
                                        <button class="text-red-600 hover:text-red-900">Hapus</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div x-show="isOpen" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-0">
                    <div class="fixed inset-0 bg-gray-800/60 backdrop-blur-sm transition-opacity" @click="isOpen = false"></div>
                    <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden z-10">
                        <form @submit.prevent="isOpen = false">
                            <div class="px-6 py-5">
                                <h3 class="text-xl font-bold text-gray-900 mb-5 border-b pb-2">
                                    Tambah/Edit Departemen
                                </h3>
                                <div class="mb-5">
                                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kode Departemen</label>
                                    <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 uppercase transition-colors" placeholder="Contoh: IT, HRD, FIN">
                                </div>
                                <div class="mb-2">
                                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Departemen</label>
                                    <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" placeholder="Contoh: Teknologi Informasi">
                                </div>
                            </div>
                            <div class="bg-gray-50 px-6 py-4 flex justify-end gap-3">
                                <button type="button" @click="isOpen = false" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100 font-medium transition-colors shadow-sm">
                                    Batal
                                </button>
                                <button type="submit" class="px-4 py-2 bg-blue-600 border border-transparent rounded-lg text-white hover:bg-blue-700 font-medium transition-colors shadow-sm">
                                    Simpan
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
